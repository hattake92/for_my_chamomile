<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для Сабины ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:Georgia, serif;
}

/* Видео */

#bg-video{

    position:fixed;
    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;

    z-index:0;
}

/* затемнение */

.overlay{

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.45);

    z-index:1;

}

/* контейнер */

.container{

    position:relative;
    z-index:2;

    width:100%;
    height:100%;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

}

/* Конверт */

.envelope-wrapper{

    cursor:pointer;
    transition:1s;
}

.envelope{

    width:300px;
    height:200px;

    background:#d6a46e;

    position:relative;

}

.envelope::before{

    content:"";

    position:absolute;

    width:0;
    height:0;

    border-top:100px solid transparent;
    border-bottom:100px solid transparent;
    border-left:150px solid #c58f58;

}

.envelope::after{

    content:"";

    position:absolute;
    right:0;

    width:0;
    height:0;

    border-top:100px solid transparent;
    border-bottom:100px solid transparent;
    border-right:150px solid #bb8453;

}

.flap{

    position:absolute;

    width:0;
    height:0;

    border-left:150px solid transparent;
    border-right:150px solid transparent;
    border-top:100px solid #efc18e;

    transform-origin:top;

    transition:.8s;

    z-index:5;

}

.pocket{

    position:absolute;
    bottom:0;

    width:0;
    height:0;

    border-left:150px solid transparent;
    border-right:150px solid transparent;
    border-bottom:100px solid #b17d4b;

    z-index:4;

}

.open .flap{

    transform:rotateX(180deg);

}

/* подсказка */

.hint{

    color:white;

    margin-top:20px;

    animation:pulse 2s infinite;

}

@keyframes pulse{

0%,100%{

opacity:.4;

}

50%{

opacity:1;

}

}

/* сообщение */

.message{

    position:absolute;

    width:80%;
    max-width:700px;

    color:white;

    text-align:center;

    font-size:30px;

    line-height:1.8;

    opacity:0;

    transition:2s;

}

.message.show{

    opacity:1;

}

</style>

</head>
<body>

<video
id="bg-video"
autoplay
muted
loop
playsinline>

<source src="./background.mp4" type="video/mp4">

Ваш браузер не поддерживает видео.

</video>

<div class="overlay"></div>

<audio id="music">

<source src="./music.mp3" type="audio/mpeg">

</audio>

<div class="container">

<div class="envelope-wrapper" id="envelope">

<div class="envelope">

<div class="flap"></div>

<div class="pocket"></div>

</div>

<div class="hint">

💌 Коснись конверта

</div>

</div>

<div class="message" id="message">

</div>

</div>

<script>

const envelope=document.getElementById("envelope");

const music=document.getElementById("music");

const message=document.getElementById("message");

const text="Сабинка!!! Если ты сейчас не улыбаешься, значит этот сайт сломался 😊 А если серьёзно — ты лучшее, что произошло в моей жизни. Спасибо, что ты есть. ❤️";

let i=0;

function printText(){

    if(i<text.length){

        message.innerHTML+=text.charAt(i);

        i++;

        setTimeout(printText,70);

    }

}

envelope.onclick=()=>{

    music.play().catch(()=>{});

    envelope.classList.add("open");

    setTimeout(()=>{

        envelope.style.display="none";

        message.classList.add("show");

        printText();

    },900);

}

</script>

</body>
</html>
